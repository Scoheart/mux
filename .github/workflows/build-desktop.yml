name: Build desktop (macOS dmg)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        description: Publication channel
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable-retry
      stable_tag:
        description: Existing vX.Y.Z tag (required for stable-retry)
        required: false
        type: string

permissions:
  contents: write
  checks: read

# Ordinary main builds intentionally have no cancelling concurrency group: every
# accepted main commit gets its own package attempt.
jobs:
  classify:
    name: Classify publication
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      tag: ${{ steps.classify.outputs.tag }}
      source_ref: ${{ steps.classify.outputs.source_ref }}
    steps:
      - name: Checkout
        # actions/checkout v5.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2

      - name: Setup Node
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24

      - name: Classify trigger
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_STABLE_TAG: ${{ inputs.stable_tag }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          FAST_LANE_UNTIL: ${{ vars.MUX_FAST_LANE_UNTIL }}
        run: |
          set -euo pipefail
          STABLE_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+$'
          PRERELEASE_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+-build\.[0-9]+$'
          version=$(tr -d '[:space:]' <version.txt)
          mode=
          tag=
          source_ref=$COMMIT_SHA

          if [[ "$EVENT_NAME" == push && "$REF" == refs/heads/main ]]; then
            direct_stable=false
            configured_mode=$(jq -er '.mode' .github/fast-lane.json)
            if [[ "$configured_mode" == direct-main-stable && -n "$FAST_LANE_UNTIL" ]]; then
              until_epoch=$(date -u -d "$FAST_LANE_UNTIL" +%s)
              now_epoch=$(date -u +%s)
              if (( now_epoch < until_epoch )); then
                direct_stable=true
              fi
            fi
            if [[ "$direct_stable" == true ]]; then
              mode=skip
            else
              before_version=$version
              if git cat-file -e "$BEFORE_SHA:version.txt" 2>/dev/null; then
                before_version=$(git show "$BEFORE_SHA:version.txt" | tr -d '[:space:]')
              fi
              title=$(git log -1 --format=%s)
              release_merge=$(node scripts/release-version.mjs is-release-merge \
                --before "$before_version" --after "$version" --title "$title")
              if [[ "$release_merge" == true ]]; then
                mode=skip
              else
                mode=prerelease
                tag="v${version}-build.$(printf '%05d' "$RUN_NUMBER")"
              fi
            fi
          elif [[ "$EVENT_NAME" == push && "$REF" == refs/tags/* ]]; then
            if [[ "$REF_NAME" =~ $STABLE_TAG_REGEX ]]; then
              mode=stable
              tag=$REF_NAME
              source_ref=$REF_NAME
            elif [[ "$REF_NAME" =~ $PRERELEASE_TAG_REGEX ]]; then
              mode=skip
            else
              echo "refusing non-stable tag: $REF_NAME" >&2
              exit 1
            fi
          elif [[ "$EVENT_NAME" == workflow_dispatch && "$INPUT_MODE" == stable-retry ]]; then
            [[ "$INPUT_STABLE_TAG" =~ $STABLE_TAG_REGEX ]] || {
              echo "stable-retry requires a vX.Y.Z tag" >&2
              exit 1
            }
            [[ "$REF" == refs/heads/main ]] || {
              echo "dispatch stable-retry from main" >&2
              exit 1
            }
            mode=stable
            tag=$INPUT_STABLE_TAG
            source_ref=$INPUT_STABLE_TAG
          elif [[ "$EVENT_NAME" == workflow_dispatch && "$INPUT_MODE" == prerelease ]]; then
            [[ "$REF" == refs/heads/main ]] || {
              echo "manual Pre-release must run from main" >&2
              exit 1
            }
            mode=prerelease
            tag="v${version}-build.$(printf '%05d' "$RUN_NUMBER")"
          else
            echo "unsupported publication trigger" >&2
            exit 1
          fi

          echo "mode=$mode" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >>"$GITHUB_OUTPUT"

  build-dmg:
    name: Build and publish
    if: ${{ needs.classify.outputs.mode != 'skip' }}
    needs: [classify]
    runs-on: macos-latest
    env:
      PUBLICATION_MODE: ${{ needs.classify.outputs.mode }}
      RELEASE_TAG: ${{ needs.classify.outputs.tag }}
    steps:
      - name: Checkout
        id: checkout
        # actions/checkout v5.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.classify.outputs.source_ref }}

      - name: Resolve source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

      - name: Checkout retry delivery helpers
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'stable-retry' }}
        # actions/checkout v5.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.sha }}
          path: .delivery
          sparse-checkout: .github/scripts

      - name: Setup Node
        # actions/setup-node v5.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        # dtolnay/rust-toolchain stable at implementation time
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Cache Rust build
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: |
            desktop/src-tauri -> target
            . -> target
          cache-on-failure: true

      - name: Check release version metadata
        shell: bash
        run: |
          if [[ "$PUBLICATION_MODE" == stable ]]; then
            node scripts/release-version.mjs check --tag "$RELEASE_TAG"
          else
            node scripts/release-version.mjs check
          fi

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Build .dmg
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --bundles app,dmg

      - name: Verify macOS release artifacts
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' -print -quit)
          DMG=$(find desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -print -quit)
          test -n "$APP"
          test -n "$DMG"

          EXPECTED=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          if [[ "$PUBLICATION_MODE" == stable ]]; then
            test "$RELEASE_TAG" = "v$EXPECTED"
          fi

          verify_app() {
            local app=$1
            local actual
            test -d "$app"
            actual=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")
            test "$actual" = "$EXPECTED"
            test "$("$app/Contents/MacOS/mux" --version)" = "mux $EXPECTED"
            codesign --verify --deep --strict --verbose=2 "$app"
          }

          verify_app "$APP"
          hdiutil verify "$DMG"

          MOUNT=$(mktemp -d)
          cleanup() {
            hdiutil detach "$MOUNT" >/dev/null 2>&1 || true
            rmdir "$MOUNT" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          hdiutil attach -readonly -nobrowse -noautoopen -mountpoint "$MOUNT" "$DMG"
          PACKAGED_APP=$(find "$MOUNT" -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$PACKAGED_APP"
          verify_app "$PACKAGED_APP"
          cleanup
          trap - EXIT

      - name: Build and package CLI
        id: cli
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p mux-cli
          case "$(uname -m)" in
            arm64|aarch64) TRIPLE=aarch64-apple-darwin ;;
            x86_64) TRIPLE=x86_64-apple-darwin ;;
            *) echo "unsupported macOS architecture" >&2; exit 1 ;;
          esac
          OUT="mux_${RELEASE_TAG}_${TRIPLE}.tar.gz"
          tar -C target/release -czf "$OUT" mux
          echo "path=$OUT" >>"$GITHUB_OUTPUT"

      - name: Name desktop installer
        id: installer
        shell: bash
        run: |
          set -euo pipefail
          SRC=$(find desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -print -quit)
          case "$(uname -m)" in
            arm64|aarch64) ARCH_LABEL=Apple-Silicon ;;
            x86_64) ARCH_LABEL=Intel ;;
            *) echo "unsupported macOS architecture" >&2; exit 1 ;;
          esac
          DEST="desktop/src-tauri/target/release/bundle/dmg/MUX-Desktop-Installer-${RELEASE_TAG}-macOS-${ARCH_LABEL}.dmg"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >>"$GITHUB_OUTPUT"
          echo "arch_label=$ARCH_LABEL" >>"$GITHUB_OUTPUT"

      - name: Wait for exact commit verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/wait-for-verify.sh "$GITHUB_REPOSITORY" "${{ steps.source.outputs.sha }}"

      # PRE-RELEASE START
      - name: Publish per-commit Pre-release
        if: ${{ needs.classify.outputs.mode == 'prerelease' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          INSTALLER: ${{ steps.installer.outputs.path }}
          CLI_ARCHIVE: ${{ steps.cli.outputs.path }}
          ARCH_LABEL: ${{ steps.installer.outputs.arch_label }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Pre-release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" "$INSTALLER" "$CLI_ARCHIVE" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ steps.source.outputs.sha }}" \
            --title "$RELEASE_TAG" \
            --prerelease \
            --notes "Automatic package from main build #${GITHUB_RUN_NUMBER}. Commit: ${GITHUB_SHA}"

          release="repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          label_asset() {
            local name=$1 label=$2 id
            id=$(gh api "$release" --jq ".assets[] | select(.name == \"$name\") | .id")
            test -n "$id"
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/$id" \
              -f "label=$label" --silent
          }
          label_asset "$(basename "$INSTALLER")" "Desktop installer · ${ARCH_LABEL//-/ }"
          label_asset "$(basename "$CLI_ARCHIVE")" "Command-line tool · ${ARCH_LABEL//-/ }"
      # PRE-RELEASE END

      # STABLE START
      - name: Package stable updater payload and manifest
        if: ${{ needs.classify.outputs.mode == 'stable' }}
        id: updater
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64|aarch64) ARCH=aarch64; ARCH_LABEL=Apple-Silicon ;;
            x86_64) ARCH=x86_64; ARCH_LABEL=Intel ;;
            *) echo "unsupported macOS architecture" >&2; exit 1 ;;
          esac
          TAR=$(find desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type f -name '*.app.tar.gz' -print -quit)
          test -n "$TAR"
          test -s "${TAR}.sig"
          SIG=$(cat "${TAR}.sig")
          VER=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          ASSET="MUX-Desktop-AutoUpdate-${RELEASE_TAG}-macOS-${ARCH_LABEL}.app.tar.gz"
          cp "$TAR" "$ASSET"
          PUB_DATE=$(git show -s --format=%cI "${{ steps.source.outputs.sha }}")
          cat >latest.json <<EOF
          {
            "version": "${VER}",
            "notes": "MUX ${RELEASE_TAG} — https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-${ARCH}": {
                "signature": "${SIG}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ASSET}"
              }
            }
          }
          EOF
          jq -e . latest.json >/dev/null
          echo "asset=$ASSET" >>"$GITHUB_OUTPUT"

      - name: Complete and publish stable Draft
        if: ${{ needs.classify.outputs.mode == 'stable' }}
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER: ${{ steps.installer.outputs.path }}
          CLI_ARCHIVE: ${{ steps.cli.outputs.path }}
          UPDATER: ${{ steps.updater.outputs.asset }}
        run: |
          PUBLISHER=.github/scripts/publish-release-assets.sh
          if [[ -f .delivery/.github/scripts/publish-release-assets.sh ]]; then
            PUBLISHER=.delivery/.github/scripts/publish-release-assets.sh
          fi
          bash "$PUBLISHER" \
            "$RELEASE_TAG" "$INSTALLER" "$CLI_ARCHIVE" "$UPDATER" latest.json
      # STABLE END
