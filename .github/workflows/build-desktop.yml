name: Build desktop (macOS dmg)

# Builds the Tauri desktop app as a macOS .dmg:
#   - push to main / manual run  -> build + publish a unique, versioned pre-release
#                                   per push (tag v<version>-build.<run_number>)
#   - push a tag like v0.1.1     -> build + publish the stable, versioned Release
#
# Build time is dominated by Rust compilation, cached across runs by
# Swatinem/rust-cache (deps + target).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create Releases and their tags

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Two independent target dirs: the desktop Tauri app, and the root
          # Cargo workspace (core + cli) that produces the `mux` binary.
          workspaces: |
            desktop/src-tauri -> target
            . -> target
          cache-on-failure: true

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('desktop/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: desktop
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build .dmg
        working-directory: desktop
        env:
          # Signs the updater artifacts (bundle.createUpdaterArtifacts) so the
          # installed app can verify them against the pubkey in tauri.conf.json.
          # Both secrets are REQUIRED once createUpdaterArtifacts is on.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # "app" is bundled explicitly so the updater's .app.tar.gz (+ .sig) is
        # always produced next to the dmg.
        run: |
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --bundles app,dmg

      - name: Verify macOS release artifacts
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' -print -quit)
          DMG=$(find desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -print -quit)
          test -n "$APP"
          test -n "$DMG"

          EXPECTED=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            test "${{ github.ref_name }}" = "v$EXPECTED"
          fi

          verify_app() {
            local app="$1"
            local actual
            test -d "$app"
            actual=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")
            test "$actual" = "$EXPECTED"
            test "$("$app/Contents/MacOS/mux" --version)" = "mux $EXPECTED"
            codesign --verify --deep --strict --verbose=2 "$app"
          }

          verify_app "$APP"
          hdiutil verify "$DMG"

          MOUNT=$(mktemp -d)
          cleanup() {
            hdiutil detach "$MOUNT" >/dev/null 2>&1 || true
            rmdir "$MOUNT" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          hdiutil attach -readonly -nobrowse -noautoopen -mountpoint "$MOUNT" "$DMG"
          PACKAGED_APP=$(find "$MOUNT" -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$PACKAGED_APP"
          verify_app "$PACKAGED_APP"
          cleanup
          trap - EXIT

      # Build the `mux` CLI (root workspace) and tar it up so the same Release
      # carries a ready-to-run binary next to the .dmg — no cargo needed. Keep
      # its compatibility filename for self-updates; GitHub's Asset Label gives
      # it a human-readable purpose in the compact mobile UI.
      - name: Build & package CLI (mux)
        id: cli
        run: |
          cargo build --release -p mux-cli
          case "$(uname -m)" in
            arm64|aarch64) TRIPLE=aarch64-apple-darwin ;;
            x86_64) TRIPLE=x86_64-apple-darwin ;;
            *) TRIPLE="$(uname -m)-apple-darwin" ;;
          esac
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            NAME="${{ github.ref_name }}"
          else
            VER=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
            NAME="v${VER}-build.$(printf '%05d' "${{ github.run_number }}")"
          fi
          # Keep this compatibility filename: released CLI binaries resolve it
          # directly when running `mux upgrade`. A friendly
          # GitHub asset label below makes its purpose clear to humans.
          OUT="mux_${NAME}_${TRIPLE}.tar.gz"
          tar -C target/release -czf "$OUT" mux
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      # --- Versioned stable release: only when a vX.Y.Z tag is pushed ---
      # Stable releases carry the auto-update channel: the signed .app.tar.gz
      # plus a latest.json manifest. Installed apps poll
      # releases/latest/download/latest.json (see tauri.conf.json), which GitHub
      # resolves to the *newest non-prerelease* — so only these hand-cut vX.Y.Z
      # releases ever push updates to users.
      - name: Package updater artifact + latest.json (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: updater
        run: |
          case "$(uname -m)" in
            arm64|aarch64) ARCH=aarch64; ARCH_LABEL=Apple-Silicon ;;
            *) ARCH=x86_64; ARCH_LABEL=Intel ;;
          esac
          TAR=$(ls desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz | head -1)
          SIG=$(cat "${TAR}.sig")
          VER=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          ASSET="MUX-Desktop-AutoUpdate-${{ github.ref_name }}-macOS-${ARCH_LABEL}.app.tar.gz"
          cp "$TAR" "$ASSET"
          cat > latest.json <<EOF
          {
            "version": "${VER}",
            "notes": "MUX ${{ github.ref_name }} — https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-${ARCH}": {
                "signature": "${SIG}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${ASSET}"
              }
            }
          }
          EOF
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Name stable desktop installer
        if: startsWith(github.ref, 'refs/tags/')
        id: installer
        run: |
          SRC=$(ls desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          case "$(uname -m)" in
            arm64|aarch64) ARCH_LABEL=Apple-Silicon ;;
            *) ARCH_LABEL=Intel ;;
          esac
          DEST="desktop/src-tauri/target/release/bundle/dmg/MUX-Desktop-Installer-${{ github.ref_name }}-macOS-${ARCH_LABEL}.dmg"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish versioned Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.installer.outputs.path }}
            ${{ steps.cli.outputs.path }}
            ${{ steps.updater.outputs.asset }}
            latest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Download guide

            - **Desktop app:** download `MUX-Desktop-Installer-${{ github.ref_name }}-macOS-Apple-Silicon.dmg`.
            - **Command line:** choose the asset labelled **Command-line tool · Apple Silicon**.
            - `latest.json` and `Desktop-AutoUpdate` are used by the app automatically; do not download them manually.

      - name: Label stable release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE="repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          label_asset() {
            NAME="$1"
            LABEL="$2"
            ID=$(gh api "$RELEASE" --jq ".assets[] | select(.name == \"$NAME\") | .id")
            test -n "$ID"
            gh api --method PATCH "repos/${{ github.repository }}/releases/assets/$ID" -f label="$LABEL" --silent
          }
          label_asset "$(basename '${{ steps.installer.outputs.path }}')" "Desktop installer · Apple Silicon"
          label_asset "$(basename '${{ steps.cli.outputs.path }}')" "Command-line tool · Apple Silicon"
          label_asset "${{ steps.updater.outputs.asset }}" "Desktop auto-update payload · no manual download"
          label_asset "latest.json" "Auto-update manifest · no manual download"

      # --- Per-push pre-release: every push to main (and manual runs) ---
      # Each push publishes its own uniquely-tagged pre-release so every build is
      # downloadable and kept in history. The tag is derived automatically from the
      # app version + the monotonic run number (e.g. v0.1.1-build.42) — no manual
      # tagging needed. The tag/release are created with the default GITHUB_TOKEN,
      # which does NOT re-trigger this workflow, so there is no build->tag->build loop.
      - name: Derive build tag
        if: github.ref == 'refs/heads/main'
        id: meta
        run: |
          VER=$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")
          # Zero-pad the run number so the release tags sort correctly on GitHub
          # (which compares the build suffix lexicographically, not numerically —
          # unpadded, build.10/11 would sort below build.9).
          BUILD=$(printf '%05d' "${{ github.run_number }}")
          echo "tag=v${VER}-build.${BUILD}" >> "$GITHUB_OUTPUT"

      # Give pre-release installers the same descriptive naming scheme as stable
      # releases while retaining the unique build tag.
      - name: Name pre-release desktop installer
        if: github.ref == 'refs/heads/main'
        id: dmg
        run: |
          SRC=$(ls desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          case "$(uname -m)" in
            arm64|aarch64) ARCH_LABEL=Apple-Silicon ;;
            *) ARCH_LABEL=Intel ;;
          esac
          DEST="desktop/src-tauri/target/release/bundle/dmg/MUX-Desktop-Installer-${{ steps.meta.outputs.tag }}-macOS-${ARCH_LABEL}.dmg"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish per-push pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: true
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.cli.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            🤖 Automatic build from `main` (build #${{ github.run_number }}).
            Pre-release — for stable, hand-cut versions see the `vX.Y.Z` releases.

            **Desktop app:** download `MUX-Desktop-Installer-<tag>-macOS-Apple-Silicon.dmg`.

            **CLI:** choose the asset labelled **Command-line tool · Apple Silicon**, then
            `tar xzf mux_*.tar.gz && ./mux` (or move it onto your PATH).

            Commit: ${{ github.sha }}

      - name: Label pre-release assets
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE="repos/${{ github.repository }}/releases/tags/${{ steps.meta.outputs.tag }}"
          label_asset() {
            NAME="$1"
            LABEL="$2"
            ID=$(gh api "$RELEASE" --jq ".assets[] | select(.name == \"$NAME\") | .id")
            test -n "$ID"
            gh api --method PATCH "repos/${{ github.repository }}/releases/assets/$ID" -f label="$LABEL" --silent
          }
          label_asset "$(basename '${{ steps.dmg.outputs.path }}')" "Desktop installer · Apple Silicon"
          label_asset "$(basename '${{ steps.cli.outputs.path }}')" "Command-line tool · Apple Silicon"
