name: Quality monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 09:17 Asia/Shanghai. GitHub cron uses UTC.
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: quality-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Test core and CLI
        run: cargo test --locked -p mux-core -p mux-cli

  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Check release version metadata
        run: node scripts/release-version.mjs check

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test frontend
        working-directory: desktop
        run: npm test

      - name: Build frontend
        working-directory: desktop
        run: npm run build

  website:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Build documentation
        working-directory: website
        run: npm run build

  verify:
    name: verify
    if: ${{ always() }}
    needs: [rust, desktop, website]
    runs-on: ubuntu-latest
    steps:
      - name: Require every producer
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          WEBSITE_RESULT: ${{ needs.website.result }}
        run: |
          test "$RUST_RESULT" = success
          test "$DESKTOP_RESULT" = success
          test "$WEBSITE_RESULT" = success

  monitor:
    name: Failure monitor
    if: ${{ always() }}
    needs: [verify]
    runs-on: ubuntu-latest
    env:
      FAILURE_ISSUE_TITLE: "[CI] Automated verification is failing"
      AUTOFIX_CONFIGURED: ${{ secrets.COPILOT_PAT != '' }}
    steps:
      - name: Open or update failure issue
        id: report
        if: ${{ needs.verify.result == 'failure' && github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label ci-failure \
            --json number \
            --jq '.[0].number // empty')

          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          details=$(cat <<EOF
          Automated verification failed on \`${GITHUB_SHA}\`.

          - Event: \`${GITHUB_EVENT_NAME}\`
          - Branch/ref: \`${GITHUB_REF}\`
          - Workflow run: ${run_url}

          Acceptance criteria:
          - Reproduce the failing check from the workflow logs.
          - Fix the root cause without weakening the check.
          - Add or update focused tests when appropriate.
          - Make the full Quality monitor workflow pass.
          EOF
          )

          if [[ -n "$issue" ]]; then
            created=false
            gh issue comment "$issue" --repo "$GITHUB_REPOSITORY" --body "$details"
          else
            created=true
            issue_url=$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$FAILURE_ISSUE_TITLE" \
              --body "$details" \
              --label bug \
              --label automated \
              --label ci-failure)
            issue=${issue_url##*/}
          fi

          echo "issue_number=$issue" >> "$GITHUB_OUTPUT"
          echo "created=$created" >> "$GITHUB_OUTPUT"

      - name: Mark automatic repair as queued
        if: ${{ needs.verify.result == 'failure' && steps.report.outputs.issue_number != '' && env.AUTOFIX_CONFIGURED == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
        run: gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label autofix

      - name: Dispatch Copilot repair
        if: ${{ needs.verify.result == 'failure' && steps.report.outputs.issue_number != '' && env.AUTOFIX_CONFIGURED == 'true' }}
        id: dispatch
        continue-on-error: true
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          BASE_BRANCH: main
        run: .github/scripts/assign-copilot.sh

      - name: Report repair dispatch failure
        if: ${{ needs.verify.result == 'failure' && steps.dispatch.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label autofix-failed \
            --remove-label autofix
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "@${GITHUB_REPOSITORY_OWNER} 自动修复派发失败，请检查 Copilot cloud agent 权限、\`COPILOT_PAT\` 和本次工作流日志。"

      - name: Explain inactive automatic repair
        if: ${{ needs.verify.result == 'failure' && steps.report.outputs.created == 'true' && env.AUTOFIX_CONFIGURED != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "@${GITHUB_REPOSITORY_OWNER} 已检测到问题并创建 Issue。自动修复尚未启用：请启用 Copilot cloud agent，并添加仓库 Secret \`COPILOT_PAT\`。"

      - name: Close recovered failure issue
        if: ${{ needs.verify.result == 'success' && github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label ci-failure \
            --json number \
            --jq '.[0].number // empty')
          if [[ -n "$issue" ]]; then
            run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            gh issue comment "$issue" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Verification recovered on \`${GITHUB_SHA}\`: ${run_url}"
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --reason completed
          fi
