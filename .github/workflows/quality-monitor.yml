name: Quality monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 09:17 Asia/Shanghai. GitHub cron uses UTC.
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: quality-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint core and CLI
        run: cargo clippy --locked -p mux-core -p mux-cli --all-targets -- -D warnings

      - name: Test core and CLI
        run: cargo test --locked -p mux-core -p mux-cli

  tauri:
    name: Desktop Rust
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Check Tauri Rust formatting
        run: cargo fmt --all --manifest-path desktop/src-tauri/Cargo.toml --check

      - name: Lint Tauri command adapters
        run: cargo clippy --locked --manifest-path desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Tauri command adapters
        run: cargo test --locked --manifest-path desktop/src-tauri/Cargo.toml

  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Check release version metadata
        run: node scripts/release-version.mjs check

      - name: Test workflow contracts
        run: node --test scripts/workflow-contract.test.mjs scripts/release-version.test.mjs

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test frontend
        working-directory: desktop
        run: npm test

      - name: Build frontend
        working-directory: desktop
        run: npm run build

  website:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Build documentation
        working-directory: website
        run: npm run build

  verify:
    name: verify
    if: ${{ always() }}
    needs: [rust, tauri, desktop, website]
    runs-on: ubuntu-latest
    steps:
      - name: Require every producer
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          TAURI_RESULT: ${{ needs.tauri.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          WEBSITE_RESULT: ${{ needs.website.result }}
        run: |
          test "$RUST_RESULT" = success
          test "$TAURI_RESULT" = success
          test "$DESKTOP_RESULT" = success
          test "$WEBSITE_RESULT" = success

  monitor:
    name: Failure monitor
    if: ${{ always() }}
    needs: [verify]
    runs-on: ubuntu-latest
    env:
      FAILURE_ISSUE_TITLE: "[CI] Automated verification is failing"
      AUTOFIX_CONFIGURED: ${{ secrets.COPILOT_PAT != '' }}
    steps:
      - name: Checkout monitor policy
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Open or update failure issue
        id: report
        if: ${{ needs.verify.result == 'failure' && github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/quality-failure-monitor.sh report

      - name: Mark automatic repair as queued
        if: ${{ needs.verify.result == 'failure' && steps.report.outputs.activated == 'true' && env.AUTOFIX_CONFIGURED == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
        run: gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label autofix

      - name: Dispatch Copilot repair
        if: ${{ needs.verify.result == 'failure' && steps.report.outputs.activated == 'true' && env.AUTOFIX_CONFIGURED == 'true' }}
        id: dispatch
        continue-on-error: true
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          BASE_BRANCH: main
        run: .github/scripts/assign-copilot.sh

      - name: Report repair dispatch failure
        if: ${{ needs.verify.result == 'failure' && steps.dispatch.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.report.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label autofix-failed \
            --remove-label autofix
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "@${GITHUB_REPOSITORY_OWNER} 自动修复派发失败，请检查 Copilot cloud agent 权限、\`COPILOT_PAT\` 和本次工作流日志。"

      - name: Close recovered failure issue
        if: ${{ needs.verify.result == 'success' && github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/quality-failure-monitor.sh recover
