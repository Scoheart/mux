name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: Require the dedicated release token
        run: test -n "$RELEASE_PLEASE_TOKEN"

      - name: Create or update the release proposal
        id: release
        # release-please-action v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout the Release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        # actions/checkout v5.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        # actions/setup-node v5.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        # dtolnay/rust-toolchain stable at implementation time
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Refresh generated lockfiles
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: node scripts/release-version.mjs refresh-locks

      - name: Commit generated lockfiles to the Release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          HEAD_BRANCH="$(jq -er '.headBranchName' <<<"$RELEASE_PR")"
          git add desktop/package-lock.json Cargo.lock desktop/src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "Generated lockfiles are already current."
            exit 0
          fi
          git -c user.name="release-please[bot]" \
            -c user.email="55107282+release-please[bot]@users.noreply.github.com" \
            commit -m "chore(release): refresh generated lockfiles"
          git push origin "HEAD:$HEAD_BRANCH"

      - name: Check the temporary Fast Lane window
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        id: fast-lane
        env:
          FAST_LANE_UNTIL: ${{ vars.MUX_FAST_LANE_UNTIL }}
        run: |
          active=false
          if test -n "$FAST_LANE_UNTIL"; then
            until_epoch="$(date -u -d "$FAST_LANE_UNTIL" +%s)"
            now_epoch="$(date -u +%s)"
            if test "$now_epoch" -lt "$until_epoch"; then
              active=true
            fi
          fi
          echo "active=$active" >>"$GITHUB_OUTPUT"

      - name: Wait for the exact Release PR head to verify
        if: ${{ steps.release.outputs.prs_created == 'true' && steps.fast-lane.outputs.active == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER="$(jq -er '.number' <<<"$RELEASE_PR")"
          HEAD_SHA="$(git rev-parse HEAD)"
          bash .github/scripts/wait-for-verify.sh "$GITHUB_REPOSITORY" "$HEAD_SHA"
          CURRENT_HEAD="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')"
          test "$CURRENT_HEAD" = "$HEAD_SHA"

      - name: Auto-merge the verified Release PR during Fast Lane
        if: ${{ steps.release.outputs.prs_created == 'true' && steps.fast-lane.outputs.active == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER="$(jq -er '.number' <<<"$RELEASE_PR")"
          HEAD_SHA="$(git rev-parse HEAD)"
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch --match-head-commit "$HEAD_SHA"
