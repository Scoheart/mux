<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <title>MUX Layout Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 自定义一点点毛玻璃和发光效果 */
    .glass-panel {
      background: rgba(24, 24, 27, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .card-hover:hover {
      box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.3), 0 4px 20px rgba(0, 0, 0, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-[#09090B] text-zinc-300 font-sans h-screen flex overflow-hidden selection:bg-purple-500/30">

  <!-- 侧边栏 (弱化背景色，取消右侧生硬边框) -->
  <aside class="w-64 bg-[#0E0E12] border-r border-white/5 flex flex-col">
    <!-- 侧边栏 Header -->
    <div class="h-16 flex items-center px-6 border-b border-white/5 font-bold text-lg text-white">
      <span class="bg-gradient-to-r from-purple-400 to-indigo-500 bg-clip-text text-transparent">MCPs</span>
      <span class="ml-2 text-xs text-zinc-500 font-normal mt-1">9 项</span>
    </div>

    <!-- 侧边栏 导航 -->
    <div class="flex-1 overflow-y-auto py-4 px-3 space-y-6">
      <!-- 状态区 -->
      <div>
        <div class="px-3 text-xs font-semibold text-zinc-500 mb-2 uppercase tracking-wider">状态</div>
        <div class="space-y-1">
          <!-- 激活状态 -->
          <button class="w-full flex items-center justify-between px-3 py-2 rounded-lg bg-white/10 text-white transition-colors">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
              <span class="text-sm font-medium">全部</span>
            </div>
            <span class="text-xs text-zinc-400">9</span>
          </button>
          <button class="w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-white/5 text-zinc-400 hover:text-zinc-200 transition-colors">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span class="text-sm">使用中</span>
            </div>
            <span class="text-xs">9</span>
          </button>
        </div>
      </div>

      <!-- 来源区 -->
      <div>
        <div class="px-3 text-xs font-semibold text-zinc-500 mb-2 uppercase tracking-wider flex justify-between">
          <span>来源</span>
          <div class="flex gap-1">
            <svg class="w-3.5 h-3.5 cursor-pointer hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          </div>
        </div>
        <div class="space-y-1">
          <button class="w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-white/5 text-zinc-400 hover:text-zinc-200 transition-colors">
            <div class="flex items-center gap-2">
              <span class="text-sm">全部来源</span>
            </div>
            <span class="text-xs">9</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="flex-1 flex flex-col">
    <!-- 顶部工具栏 (更现代的搜索框和按钮) -->
    <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 bg-[#09090B]">
      <!-- 左侧控制区: 搜索 + Agent 选择器 -->
      <div class="flex items-center gap-6">
        <!-- Agent 选择器 (Hover 激活下拉) -->
        <div class="relative group">
          <button class="flex items-center gap-3 px-3 py-1.5 rounded-lg hover:bg-white/5 transition-colors border border-transparent hover:border-white/10">
            <div class="w-6 h-6 rounded-md bg-white/10 flex items-center justify-center">
              <svg class="w-4 h-4 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <div class="flex flex-col items-start">
              <span class="text-sm font-medium text-zinc-200">选择 Agent</span>
              <span class="text-[10px] text-zinc-500">38 可配置 · 154 仅收录</span>
            </div>
            <svg class="w-4 h-4 text-zinc-500 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          
          <!-- 下拉菜单 (绝对定位) -->
          <div class="absolute top-full left-0 mt-2 w-64 bg-[#121214] border border-white/10 rounded-xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 overflow-hidden transform translate-y-2 group-hover:translate-y-0">
            <div class="p-2 border-b border-white/5 bg-black/20">
              <div class="relative">
                <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="按名称搜索..." class="w-full bg-[#18181B] border border-white/5 text-xs text-white rounded-md pl-8 pr-2 py-1.5 focus:outline-none focus:border-purple-500/50">
              </div>
            </div>
            <div class="max-h-60 overflow-y-auto p-1">
              <button class="w-full flex items-center gap-3 px-2 py-2 hover:bg-white/5 rounded-lg transition-colors group/item">
                <img src="https://cursor.sh/favicon.ico" class="w-5 h-5 rounded" alt="Cursor">
                <div class="flex flex-col items-start min-w-0">
                  <span class="text-sm text-zinc-200 truncate">Cursor</span>
                  <span class="text-[10px] text-zinc-500 truncate">JSON · cursor</span>
                </div>
              </button>
              <button class="w-full flex items-center gap-3 px-2 py-2 hover:bg-white/5 rounded-lg transition-colors group/item bg-purple-500/10">
                <svg class="w-5 h-5 text-purple-400" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
                <div class="flex flex-col items-start min-w-0">
                  <span class="text-sm text-purple-300 font-medium truncate">Copilot</span>
                  <span class="text-[10px] text-purple-400/60 truncate">JSON · github-copilot</span>
                </div>
              </button>
            </div>
          </div>
        </div>

        <!-- 搜索框 -->
        <div class="relative w-80">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="搜索 MCP..." class="w-full bg-[#18181B] border border-white/5 text-sm text-white rounded-full pl-9 pr-4 py-1.5 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50 transition-all placeholder:text-zinc-600">
        </div>
      </div>
      
      <!-- 操作按钮 -->
      <div class="flex items-center gap-4">
        <button class="text-sm text-zinc-400 hover:text-white transition-colors">粘贴配置</button>
        <button class="text-zinc-400 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </button>
        <button class="bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium px-4 py-1.5 rounded-full flex items-center gap-1.5 transition-all shadow-lg shadow-purple-900/20">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新建 MCP
        </button>
      </div>
    </header>

    <!-- 卡片网格区 -->
    <div class="flex-1 overflow-y-auto p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- 单个卡片 Demo -->
        <div class="bg-[#121214] border border-white/5 rounded-2xl p-5 flex flex-col gap-4 card-hover transition-all duration-300 group relative overflow-hidden">
          <!-- 隐约的顶部高光背景 -->
          <div class="absolute top-0 left-0 right-0 h-1/2 bg-gradient-to-b from-green-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          
          <!-- 卡片 Header -->
          <div class="flex items-start gap-3 relative z-10">
            <div class="w-10 h-10 rounded-xl bg-green-500/20 flex items-center justify-center text-green-400 font-bold text-lg border border-green-500/20 shadow-inner">
              C
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-zinc-100 font-semibold text-base truncate">chrome-devtools</h3>
              <div class="flex items-center gap-2 mt-1">
                <span class="bg-zinc-800 text-zinc-400 text-[10px] px-1.5 py-0.5 rounded font-mono uppercase tracking-wider">STDIO</span>
                <span class="flex items-center gap-1 text-[11px] text-zinc-400">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
                  Cursor
                </span>
              </div>
            </div>
          </div>

          <!-- 代码/命令行区域 (更拟物、对比度更强) -->
          <div class="bg-black/60 rounded-xl p-3 border border-white/5 font-mono text-[11px] text-zinc-400 flex items-center gap-2 relative z-10">
            <span class="text-zinc-600 select-none">❯_</span>
            <span class="truncate block">npx -y chrome-devtools-mcp@...</span>
          </div>

          <!-- 卡片 Footer -->
          <div class="flex items-center justify-between pt-4 border-t border-white/[0.04] mt-auto relative z-10">
            <div class="flex items-center gap-1.5 text-xs text-zinc-400">
              <span class="w-2 h-2 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
              <span>1 个 Agent</span>
            </div>
            
            <!-- 操作按钮 (平时弱化，Hover时高亮) -->
            <div class="flex items-center gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
              <button class="p-1.5 text-zinc-400 hover:text-white hover:bg-white/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
              <button class="p-1.5 text-zinc-400 hover:text-white hover:bg-white/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
              <button class="p-1.5 text-zinc-400 hover:text-red-400 hover:bg-red-400/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
          </div>
        </div>

        <!-- 模拟第二个卡片 (带 URL) -->
        <div class="bg-[#121214] border border-white/5 rounded-2xl p-5 flex flex-col gap-4 card-hover transition-all duration-300 group relative overflow-hidden">
          <div class="absolute top-0 left-0 right-0 h-1/2 bg-gradient-to-b from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="flex items-start gap-3 relative z-10">
            <div class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold text-lg border border-blue-500/20 shadow-inner">
              F
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-zinc-100 font-semibold text-base truncate">Figma</h3>
              <div class="flex items-center gap-2 mt-1">
                <span class="bg-zinc-800 text-zinc-400 text-[10px] px-1.5 py-0.5 rounded font-mono uppercase tracking-wider">HTTP</span>
                <span class="flex items-center gap-1 text-[11px] text-zinc-400">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
                  Cursor
                </span>
              </div>
            </div>
          </div>
          <div class="bg-blue-500/10 rounded-xl p-3 border border-blue-500/20 font-mono text-[11px] text-blue-400 flex items-center gap-2 relative z-10">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            <span class="truncate block">https://mcp.figma.com/mcp</span>
          </div>
          <div class="flex items-center justify-between pt-4 border-t border-white/[0.04] mt-auto relative z-10">
            <div class="flex items-center gap-1.5 text-xs text-zinc-400">
              <span class="w-2 h-2 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
              <span>1 个 Agent</span>
            </div>
            <div class="flex items-center gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
              <button class="p-1.5 text-zinc-400 hover:text-white hover:bg-white/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
              <button class="p-1.5 text-zinc-400 hover:text-white hover:bg-white/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
              <button class="p-1.5 text-zinc-400 hover:text-red-400 hover:bg-red-400/10 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</body>
</html>
